interface:
  display_name: "Maintainer Review"
  short_description: "Assess unmet need, design alternatives, and PR value"
  default_prompt: "Use $maintainer-review with this GitHub issue or PR URL. Before evaluating the requested solution, identify the underlying user outcome, trace whether supported functionality already satisfies it, and compare the proposal with no code change and a better or narrower design. Then complete the desk review, including required lifecycle interleaving and cleanup-ownership checks, request approval before any decision-relevant runtime probe, compare credible competing PRs, recommend the best maintainer action, and include an English comment draft when closure or changes are needed."
